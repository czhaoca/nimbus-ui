# repo-privacy-kit per-repo configuration (sourced by .githooks/pre-commit).
# Every entry needs a justification comment. Regexes are ERE fragments.

# Extra alternatives appended to the secret-scan false-positive allowlist.
#EXTRA_SECRET_ALLOWLIST='MY_ENV_VAR_NAME|another-placeholder-pattern'

# Staged-path globs skipped by the SECRET scan only (generated artifacts,
# lockfiles). The private-binding scan still covers them.
#SECRET_SCAN_SKIP_GLOBS="clients/* *.lock"

# Path regex allowed to carry private-binding-looking content (design docs
# with placeholder topology, etc.).
#BINDING_PATH_ALLOWLIST='^(design/|deploy/example\.yml$)'

# Extra line-level allowlist for the private-binding scan.
#EXTRA_BINDING_LINE_ALLOWLIST='my-documented-exception'

# Set to 0 to skip the staged-Python ruff lint step.
#LINT_PY=1

# Module-level bearer-token HOLDER variable in src/lib/api/client.ts
# (_authToken = token assigns a runtime value, never a literal).
EXTRA_SECRET_ALLOWLIST='_authToken'
