# nimbus-ui CI — contract typecheck + lint + build (repo-decouple #250)
# cron = nightly contract revalidation; manual = the backend's
# contract-change API trigger (#253). Publish steps stay push-only.
when:
  event: [push, pull_request, cron, manual]
  branch: main

steps:
  - name: install
    image: node:22-alpine
    commands:
      - corepack enable && corepack prepare pnpm@latest --activate
      - pnpm install --frozen-lockfile

  # Local pin parity (czhaoca/nimbus#305): the vendored schema's first-line header
  # (`// nimbus-contract: X.Y.Z`, stamped by the backend generator) must
  # equal package.json's nimbusContract pin. Network-free, no backend
  # checkout — red means a half-delivered bump or a hand-edited pin.
  - name: check-contract
    image: node:22-alpine
    commands:
      - corepack enable && corepack prepare pnpm@latest --activate
      - pnpm check-contract

  # Consumer contract gate (ADR-0008 §5): the vendored schema is the pinned
  # contract; the compile is the contract test. Bumps arrive as backend-CI
  # bot commits updating src/lib/api/schema.d.ts + the version stamp.
  - name: contract-typecheck
    image: node:22-alpine
    commands:
      - corepack enable && corepack prepare pnpm@latest --activate
      - pnpm typecheck

  - name: lint
    image: node:22-alpine
    commands:
      - corepack enable && corepack prepare pnpm@latest --activate
      - pnpm lint

  - name: test
    image: node:22-alpine
    environment:
      # Same heap discipline as the build step — the runner LXC is small.
      NODE_OPTIONS: "--max-old-space-size=1536"
    commands:
      - corepack enable && corepack prepare pnpm@latest --activate
      - pnpm test

  - name: build
    image: node:22-alpine
    environment:
      # Heap cap below the runner LXC's cgroup limit so Node GCs instead
      # of ballooning into an OOM kill (pipeline #3, "Killed" at static gen).
      NODE_OPTIONS: "--max-old-space-size=1536"
    commands:
      - corepack enable && corepack prepare pnpm@latest --activate
      - pnpm build

  # Hermetic functional smoke (#31/#32/#33): DOM asserts against the
  # mocked-engine harness — no engine, no baselines, platform-independent.
  # Re-installs node_modules because this glibc (noble) image cannot load
  # the musl-native binaries (@next/swc, lightningcss) the alpine install
  # step produced; later steps no longer read node_modules. Serves the
  # build step's standalone output instead of `next dev` — a dev-mode
  # cold compile is memory-hungry and this runner LXC OOM-kills (see the
  # build step's NODE_OPTIONS comment); the asset copies are the
  # documented `output: standalone` deploy recipe.
  - name: e2e-smoke
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    environment:
      NODE_OPTIONS: "--max-old-space-size=1536"
      E2E_WEB_SERVER: standalone
    commands:
      - corepack enable && corepack prepare pnpm@latest --activate
      - pnpm install --frozen-lockfile
      - cp -r public .next/standalone/
      - cp -r .next/static .next/standalone/.next/
      - pnpm test:e2e:smoke

  # Demo-seeded engine sidecar for the merge gate: ENGINE_IMAGE (formerly a
  # declared-and-unused env var) is now genuinely consumed as this step's
  # image; bootstrap per the backend's design/shared/dev-db-bootstrap.md.
  # Same GAP-014 false-gate as e2e-gate below — flip both together.
  - name: engine
    image: ghcr.io/czhaoca/nimbus/engine:latest
    detach: true
    commands:
      - nimbus db init
      - nimbus db seed --demo
      - nimbus serve
    when:
      - evaluate: "false"

  # Merge-gate e2e vs the published engine image — REAL but CI-UNVERIFIED:
  # the constant-false filter keeps it skipped until the owner stages the
  # repo-scoped ghcr pull secret (nimbus GAP-014) and flips both `when`
  # filters to real events (procedure: e2e/README.md "Enabling the engine
  # gate"). The UI dev server boots in-step (webServer) with its rewrite
  # proxy pointed at the engine sidecar; specs are the seed-tolerant
  # e2e/engine suite. Expect a first-run fix pass once flipped.
  - name: e2e-gate
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    environment:
      NODE_OPTIONS: "--max-old-space-size=1536"
      NIMBUS_API_URL: http://engine:8000
    commands:
      - corepack enable && corepack prepare pnpm@latest --activate
      - pnpm install --frozen-lockfile
      - pnpm test:e2e:engine
    when:
      - evaluate: "false"

  # Publish ghcr.io/czhaoca/nimbus-ui on main pushes (#252): the backend
  # repo's workstation compose pulls this image by tag; governed registry
  # slots pin api+ui tags together. Secret ghcr_token is repo-staged,
  # push-event + buildx-image filtered.
  - name: prepare-tags
    image: alpine:3
    commands:
      - printf 'latest\n%s\n' "$(echo "$CI_COMMIT_SHA" | cut -c1-7)" > .tags
    when:
      event: push

  - name: publish-image
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: ghcr.io
      repo: ghcr.io/czhaoca/nimbus-ui
      dockerfile: Dockerfile
      context: .
      tags_file: .tags
      username: czhaoca
      password:
        from_secret: ghcr_token
      platforms: linux/amd64
    when:
      event: push
